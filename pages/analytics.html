<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics | MELODICT</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/analytics.css">
</head>
<body class="bg-neo">
  <input type="checkbox" id="mobile-toggle">

  <nav id="sidebar" class="bg-white">
    <div class="p-4" style="border-bottom: var(--neo-border);">
      <h2 class="fw-black mb-0">MELODICT</h2>
      <small class="fw-bold">STAY LOUD <br> STAY GROUNDED</small>
    </div>
    <div class="p-4 d-flex flex-column gap-2 flex-grow-1">
      <a href="dashboard.html" class="nav-link-neo p-2 text-decoration-none text-center">Dashboard</a>
      <a href="analytics.html" class="nav-link-neo active p-2 text-decoration-none text-center bg-neon-green">Analytics</a>
      <a href="wellness.html" class="nav-link-neo p-2 text-decoration-none text-center">Wellness</a>
      <a href="settings.html" class="nav-link-neo p-2 text-decoration-none text-center">Settings</a>
    </div>
  </nav>

  <main id="main-content" class="p-4 p-md-5">
    <header class="d-flex align-items-center gap-3 mb-5">
      <label for="mobile-toggle" class="mobile-btn-inline mb-0">
        <div class="strip"></div>
        <div class="strip"></div>
        <div class="strip"></div>
      </label>
      <h1 class="fw-black mb-0">AUDIO ANALYTICS</h1>
    </header>

    <div class="row g-4 mb-4">
      <div class="col-md-4">
        <div class="card neo-card p-4 bg-neon-yellow">
          <h6 class="fw-black">AVG VALENCE</h6>
          <h2 class="display-4 fw-black mb-0">0.72</h2>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card neo-card p-4 bg-white">
          <h6 class="fw-black">AVG ENERGY</h6>
          <h2 class="display-4 fw-black mb-0">0.85</h2>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card neo-card p-4 bg-neon-pink">
          <h6 class="fw-black text-white">AVG TEMPO</h6>
          <h2 class="display-4 fw-black text-white mb-0">120 <small class="fs-6">BPM</small></h2>
        </div>
      </div>
    </div>

    <div class="card neo-card p-4 p-md-5 bg-white overflow-hidden">
      <h3 class="fw-black mb-4">WEEKLY ENERGY LEVELS</h3>
      <div class="css-chart pb-5">
        <div class="bar" style="height: 40%; background: var(--neo-pink);">
          <span>40</span><div class="bar-label">MON</div>
        </div>
        <div class="bar" style="height: 70%; background: var(--neo-yellow);">
          <span>70</span><div class="bar-label">TUE</div>
        </div>
        <div class="bar" style="height: 55%; background: var(--neo-green);">
          <span>55</span><div class="bar-label">WED</div>
        </div>
        <div class="bar" style="height: 90%; background: var(--neo-pink);">
          <span>90</span><div class="bar-label">THU</div>
        </div>
        <div class="bar" style="height: 65%; background: var(--neo-yellow);">
          <span>65</span><div class="bar-label">FRI</div>
        </div>
      </div>
    </div>
  </main>

</body>
</html>
