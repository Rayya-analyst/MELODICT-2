<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings | MELODICT</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/global.css">
</head>
<body class="bg-neo">
  <input type="checkbox" id="mobile-toggle">

  <nav id="sidebar" class="bg-white">
    <div class="p-4 border-bottom border-neo">
      <h2 class="fw-black mb-0">MELODICT</h2>
      <small class="fw-bold">DATA-DRIVEN RHYTHM</small>
    </div>
    <div class="p-4 d-flex flex-column gap-2 flex-grow-1">
      <a href="dashboard.html" class="nav-link-neo p-2 text-decoration-none text-center">Dashboard</a>
      <a href="analytics.html" class="nav-link-neo p-2 text-decoration-none text-center">Analytics</a>
      <a href="wellness.html" class="nav-link-neo p-2 text-decoration-none text-center">Wellness</a>
      <a href="settings.html" class="nav-link-neo active p-2 text-decoration-none text-center bg-neon-green">Settings</a>
    </div>
  </nav>

  <main id="main-content" class="p-4 p-md-5">
    <header class="d-flex align-items-center gap-3 mb-5">
      <label for="mobile-toggle" class="mobile-btn-inline mb-0">
        <div class="strip"></div>
        <div class="strip"></div>
        <div class="strip"></div>
      </label>
      <h1 class="fw-black mb-0">PREFERENCES</h1>
    </header>

    <div class="row g-4">
      <div class="col-lg-6">
        <div class="card neo-card p-4 bg-white">
          <h3 class="fw-black mb-4 border-bottom border-neo pb-3">GENERAL</h3>
          
          <div class="d-flex justify-content-between align-items-center mb-4">
            <span class="fw-bold fs-5">Spotify Connect</span>
            <button class="btn-neo bg-neon-green px-3 py-1 fs-6 shadow-none">CONNECTED</button>
          </div>

          <div class="d-flex justify-content-between align-items-center mb-4">
            <span class="fw-bold fs-5">Data Sync</span>
            <input type="checkbox" class="neo-toggle" checked>
          </div>

          <div class="d-flex justify-content-between align-items-center">
            <span class="fw-bold fs-5">Push Notifications</span>
            <input type="checkbox" class="neo-toggle">
          </div>
        </div>
      </div>

      <div class="col-lg-6">
        <div class="card neo-card p-4 bg-neon-yellow">
          <h3 class="fw-black mb-4 border-bottom border-neo pb-3">WELLNESS SCHEDULE</h3>
          
          <div class="bg-white border-neo p-3 mb-3 d-flex justify-content-between align-items-center shadow-none">
            <span class="fw-bold">Morning Focus (08:00 AM)</span>
            <button class="btn btn-dark rounded-0 fw-black btn-sm">X</button>
          </div>
          
          <div class="bg-white border-neo p-3 mb-4 d-flex justify-content-between align-items-center shadow-none">
            <span class="fw-bold">Evening Wind-down (09:00 PM)</span>
            <button class="btn btn-dark rounded-0 fw-black btn-sm">X</button>
          </div>

          <button class="btn-neo bg-white w-100 fs-5 border-dashed" style="border-style: dashed;">+ ADD TIME SLOT</button>
        </div>
      </div>
    </div>
  </main>

</body>
</html>
